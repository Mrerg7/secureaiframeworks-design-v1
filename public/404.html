<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page Not Found — secureaiframeworks.design</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0f;
      color: #fff;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 32rem;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(to right, #22f5ff, #a855f7);
      color: #0a0a0f;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    h1 span { background: linear-gradient(to right, #22f5ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p {
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: linear-gradient(to right, #22f5ff, #a855f7);
      color: #0a0a0f;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: filter 0.2s;
    }
    a:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">404</div>
    <h1><span>Page</span> Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Return to explore secure AI frameworks and intentional design.</p>
    <a href="/">Back to secureaiframeworks.design</a>
  </div>
</body>
</html>
